<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">App-first computing versus agent-first computing</title>
  <desc id="desc">A split-screen editorial visual contrasting fragmented app windows with a coordinated AI agent device ecosystem.</desc>
  <defs>
    <linearGradient id="leftBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="1" stop-color="#26313f"/>
    </linearGradient>
    <linearGradient id="rightBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#dbe7f4"/>
    </linearGradient>
    <linearGradient id="blueGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="900" fill="url(#leftBg)"/>
  <rect x="800" width="800" height="900" fill="url(#rightBg)"/>
  <path d="M740 0 L850 900" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.85"/>

  <text x="80" y="90" fill="#e5eef7" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="700">APP-FIRST WORK</text>
  <text x="80" y="132" fill="#93a4b8" font-family="Inter, Arial, sans-serif" font-size="22">Fragmented windows. Manual navigation. Context switching.</text>

  <text x="930" y="90" fill="#102033" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="700">AGENT-FIRST WORK</text>
  <text x="930" y="132" fill="#53657a" font-family="Inter, Arial, sans-serif" font-size="22">Coordinated devices. Intent-driven workflows. Persistent context.</text>

  <g filter="url(#shadow)">
    <rect x="105" y="290" width="590" height="390" rx="28" fill="#111827"/>
    <rect x="132" y="318" width="536" height="316" rx="12" fill="#eef6ff"/>
    <rect x="170" y="706" width="460" height="28" rx="14" fill="#0b1220"/>
  </g>

  <g opacity="0.95" filter="url(#shadow)">
    <rect x="150" y="350" width="290" height="165" rx="12" fill="#ffffff"/>
    <rect x="170" y="380" width="250" height="12" rx="6" fill="#c8d4e3"/>
    <rect x="170" y="410" width="70" height="80" rx="5" fill="#7dd3fc"/>
    <rect x="252" y="445" width="70" height="45" rx="5" fill="#60a5fa"/>
    <rect x="334" y="425" width="70" height="65" rx="5" fill="#2563eb"/>

    <rect x="300" y="270" width="300" height="170" rx="12" fill="#111827"/>
    <rect x="324" y="303" width="180" height="10" rx="5" fill="#334155"/>
    <rect x="324" y="330" width="230" height="8" rx="4" fill="#475569"/>
    <rect x="324" y="356" width="180" height="8" rx="4" fill="#0ea5e9"/>
    <rect x="324" y="382" width="210" height="8" rx="4" fill="#475569"/>

    <rect x="245" y="465" width="330" height="160" rx="12" fill="#f8fbff"/>
    <rect x="270" y="495" width="280" height="10" rx="5" fill="#c8d4e3"/>
    <circle cx="350" cy="555" r="45" fill="#2563eb" opacity="0.85"/>
    <path d="M350 555 L350 510 A45 45 0 0 1 393 569 Z" fill="#93c5fd"/>
    <rect x="425" y="525" width="90" height="12" rx="6" fill="#c8d4e3"/>
    <rect x="425" y="555" width="120" height="12" rx="6" fill="#c8d4e3"/>
    <rect x="425" y="585" width="80" height="12" rx="6" fill="#f97316"/>

    <rect x="405" y="395" width="245" height="135" rx="12" fill="#ffffff"/>
    <rect x="430" y="430" width="190" height="10" rx="5" fill="#c8d4e3"/>
    <rect x="430" y="462" width="130" height="10" rx="5" fill="#60a5fa"/>
    <rect x="430" y="492" width="170" height="10" rx="5" fill="#c8d4e3"/>
  </g>

  <g fill="none" stroke="#b7c7d9" stroke-width="3" stroke-dasharray="9 14" opacity="0.8">
    <path d="M130 260 C250 170, 430 170, 610 260"/>
    <path d="M95 560 C210 690, 520 710, 690 560"/>
    <path d="M610 260 C720 350, 710 480, 650 590"/>
  </g>

  <g font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" text-anchor="middle">
    <rect x="120" y="190" width="58" height="58" rx="12" fill="#22c55e"/>
    <text x="149" y="230" fill="#ffffff">S</text>
    <rect x="330" y="160" width="58" height="58" rx="12" fill="#3b82f6"/>
    <text x="359" y="200" fill="#ffffff">M</text>
    <rect x="545" y="190" width="58" height="58" rx="12" fill="#f97316"/>
    <text x="574" y="230" fill="#ffffff">P</text>
    <rect x="655" y="510" width="58" height="58" rx="12" fill="#7c3aed"/>
    <text x="684" y="550" fill="#ffffff">C</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1020" y="215" width="420" height="215" rx="18" fill="#0f172a"/>
    <rect x="1048" y="245" width="365" height="22" rx="11" fill="#1e293b"/>
    <path d="M1060 345 C1110 315, 1160 370, 1210 332 C1265 292, 1320 358, 1390 310" fill="none" stroke="#38bdf8" stroke-width="6" opacity="0.8"/>
    <circle cx="1325" cy="330" r="42" fill="none" stroke="#2563eb" stroke-width="18"/>
    <path d="M1325 288 A42 42 0 0 1 1365 345" fill="none" stroke="#7dd3fc" stroke-width="18"/>
    <rect x="1060" y="385" width="160" height="10" rx="5" fill="#334155"/>
    <rect x="1250" y="385" width="130" height="10" rx="5" fill="#334155"/>
  </g>

  <g filter="url(#glow)">
    <circle cx="1215" cy="545" r="68" fill="#0f172a" stroke="#38bdf8" stroke-width="5"/>
    <circle cx="1190" cy="538" r="12" fill="#ffffff"/>
    <circle cx="1240" cy="538" r="12" fill="#ffffff"/>
    <path d="M1168 570 Q1215 598 1262 570" fill="none" stroke="#60a5fa" stroke-width="5" stroke-linecap="round"/>
  </g>

  <g fill="none" stroke="#60a5fa" stroke-width="6" opacity="0.75" filter="url(#glow)">
    <path d="M1215 612 V700"/>
    <path d="M1160 570 C1040 585, 980 620, 940 705"/>
    <path d="M1270 570 C1390 585, 1450 620, 1490 705"/>
    <path d="M1215 478 C1215 455, 1218 445, 1230 430"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="1050" y="698" width="330" height="105" rx="26" fill="#d8e1ec" stroke="#f8fbff" stroke-width="4"/>
    <rect x="1085" y="782" width="260" height="8" rx="4" fill="#38bdf8"/>
    <circle cx="1215" cy="750" r="9" fill="#38bdf8"/>

    <rect x="900" y="650" width="82" height="150" rx="24" fill="#111827"/>
    <rect x="912" y="668" width="58" height="112" rx="15" fill="#0f172a" stroke="#334155"/>
    <circle cx="941" cy="724" r="30" fill="#0f172a" stroke="#38bdf8" stroke-width="3"/>
    <circle cx="930" cy="722" r="6" fill="#ffffff"/>
    <circle cx="953" cy="722" r="6" fill="#ffffff"/>

    <rect x="1455" y="642" width="88" height="160" rx="28" fill="#111827"/>
    <rect x="1468" y="675" width="62" height="88" rx="18" fill="#0f172a" stroke="#334155"/>
    <circle cx="1499" cy="719" r="28" fill="#0f172a" stroke="#38bdf8" stroke-width="3"/>
    <circle cx="1489" cy="717" r="6" fill="#ffffff"/>
    <circle cx="1510" cy="717" r="6" fill="#ffffff"/>
  </g>

  <text x="400" y="815" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" text-anchor="middle">Screens full of tools</text>
  <text x="1215" y="845" fill="#203044" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" text-anchor="middle">One coordinated execution layer</text>
</svg>
